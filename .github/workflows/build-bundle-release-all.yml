name: Build & Release for all platforms
on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:

  build-linux-x64:
    uses: ./.github/workflows/linux-build-bundle.yml

  build-windows-x64:
    uses: ./.github/workflows/windows-build-bundle.yml
    with:
      msystem: UCRT64

  build-macos-x64:
    uses: ./.github/workflows/macos-build-bundle.yml
    with:
      runner: macos-26-intel

  build-macos-arm64:
    uses: ./.github/workflows/macos-build-bundle.yml
    with:
      runner: macos-26

  make-release:

    runs-on: ubuntu-latest

    needs:
      - build-linux-x64
      - build-windows-x64
      - build-macos-x64
      - build-macos-arm64

    steps:

      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download release artifacts
        uses: actions/download-artifact@v5

      - name: Make new prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          files_list=$(find *-artifact-* -type f | paste -sd' ')
          current_version=$(./version.sh get-vcs)
          gh release create "$current_version" $files_list \
          --title "ZeGrapher $current_version" --prerelease
